<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Welcome to my To-Do-List</h1>
    <input type="text" placeholder="Enter any Task" id="input">
    <div class="btns">
        <button id="add" class="btn">Add task</button>
        <button id="del" class="btn">Delete Task</button>
        <button id="updt" class="btn">Update Task</button>
        <button id="show" class="btn">Show the list</button>
    </div>
    <ul class="list"></ul>
    <script src="code.js"></script>
</body>
</html>
